<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MQTT Debug Monitor</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #0d0d0d;
    color: #e0e0e0;
    font-family: 'Courier New', monospace;
    font-size: 14px;
    padding: 20px;
  }

  h1 {
    font-size: 1.4rem;
    color: #a855f7;
    margin-bottom: 4px;
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .subtitle {
    color: #555;
    font-size: 0.8rem;
    margin-bottom: 20px;
  }

  /* ── STATUS BAR ── */
  .status-bar {
    display: flex;
    gap: 20px;
    flex-wrap: wrap;
    margin-bottom: 20px;
    padding: 12px 16px;
    background: #111;
    border: 1px solid #222;
    border-radius: 4px;
  }

  .stat {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .stat-label {
    font-size: 0.65rem;
    color: #555;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .stat-value {
    font-size: 1rem;
    font-weight: bold;
  }

  .dot {
    display: inline-block;
    width: 10px;
    height: 10px;
    border-radius: 50%;
    margin-right: 6px;
    background: #555;
  }

  .dot.green  { background: #22c55e; box-shadow: 0 0 6px #22c55e; }
  .dot.red    { background: #ef4444; box-shadow: 0 0 6px #ef4444; }
  .dot.yellow { background: #eab308; animation: blink 1s infinite; }

  @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

  /* ── LATEST DATA ── */
  .latest-box {
    background: #111;
    border: 1px solid #222;
    border-radius: 4px;
    padding: 16px;
    margin-bottom: 20px;
  }

  .latest-box h2 {
    font-size: 0.8rem;
    color: #555;
    text-transform: uppercase;
    letter-spacing: 2px;
    margin-bottom: 12px;
  }

  .fields-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
    gap: 10px;
  }

  .field-item {
    background: #0d0d0d;
    border: 1px solid #1a1a1a;
    border-radius: 4px;
    padding: 8px 10px;
  }

  .field-key {
    font-size: 0.65rem;
    color: #666;
    margin-bottom: 2px;
  }

  .field-val {
    font-size: 1rem;
    color: #e0e0e0;
    font-weight: bold;
  }

  .field-val.highlight {
    color: #a855f7;
    font-size: 1.2rem;
  }

  /* ── LOG TABLE ── */
  .log-box {
    background: #111;
    border: 1px solid #222;
    border-radius: 4px;
    padding: 16px;
  }

  .log-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
  }

  .log-header h2 {
    font-size: 0.8rem;
    color: #555;
    text-transform: uppercase;
    letter-spacing: 2px;
  }

  .btn-clear {
    background: transparent;
    border: 1px solid #333;
    color: #666;
    padding: 4px 12px;
    font-family: inherit;
    font-size: 0.75rem;
    cursor: pointer;
    border-radius: 2px;
    transition: all 0.2s;
  }

  .btn-clear:hover {
    border-color: #ef4444;
    color: #ef4444;
  }

  #log-container {
    max-height: 500px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .log-entry {
    background: #0d0d0d;
    border: 1px solid #1a1a1a;
    border-radius: 4px;
    padding: 8px 10px;
    animation: fadeIn 0.3s ease;
    border-left: 3px solid #333;
  }

  .log-entry.new-entry {
    border-left-color: #a855f7;
  }

  .log-entry.error-entry {
    border-left-color: #ef4444;
  }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: none; } }

  .log-meta {
    display: flex;
    gap: 10px;
    align-items: center;
    margin-bottom: 4px;
    flex-wrap: wrap;
  }

  .log-no {
    color: #333;
    font-size: 0.65rem;
  }

  .log-ts {
    color: #555;
    font-size: 0.7rem;
  }

  .log-topic {
    color: #a855f7;
    font-size: 0.75rem;
    background: rgba(168,85,247,0.1);
    padding: 1px 6px;
    border-radius: 2px;
  }

  .log-raw {
    color: #888;
    font-size: 0.75rem;
    word-break: break-all;
    white-space: pre-wrap;
    line-height: 1.4;
  }

  .empty-state {
    text-align: center;
    color: #333;
    padding: 40px;
    font-size: 0.9rem;
  }

  .empty-state .big {
    font-size: 2rem;
    margin-bottom: 8px;
  }
</style>
</head>
<body>

<h1>📡 MQTT Debug Monitor</h1>
<p class="subtitle">Menampilkan semua data mentah dari MQTT tanpa filter apapun</p>

<!-- STATUS BAR -->
<div class="status-bar">
  <div class="stat">
    <span class="stat-label">SSE</span>
    <span class="stat-value" id="sse-status">
      <span class="dot yellow" id="sse-dot"></span>Menghubungkan...
    </span>
  </div>
  <div class="stat">
    <span class="stat-label">MQTT Broker</span>
    <span class="stat-value" id="mqtt-status">
      <span class="dot" id="mqtt-dot"></span>–
    </span>
  </div>
  <div class="stat">
    <span class="stat-label">Pesan Diterima</span>
    <span class="stat-value" id="total-count">0</span>
  </div>
  <div class="stat">
    <span class="stat-label">Terakhir Masuk</span>
    <span class="stat-value" id="last-time">–</span>
  </div>
  <div class="stat">
    <span class="stat-label">Topic Terakhir</span>
    <span class="stat-value" id="last-topic">–</span>
  </div>
</div>

<!-- LATEST PARSED DATA -->
<div class="latest-box" id="latest-box" style="display:none">
  <h2>Data Terbaru (Parsed)</h2>
  <div class="fields-grid" id="fields-grid"></div>
</div>

<!-- LOG -->
<div class="log-box">
  <div class="log-header">
    <h2>Log Semua Pesan MQTT</h2>
    <button class="btn-clear" onclick="clearLog()">Hapus Log</button>
  </div>
  <div id="log-container">
    <div class="empty-state">
      <div class="big">⏳</div>
      Menunggu data dari ESP32...
    </div>
  </div>
</div>

<script>
let totalCount  = 0;
let logEntries  = [];
let sseConnected = false;

// ── SSE ───────────────────────────────────────────────────────────────────────
function connectSSE() {
  const sse = new EventSource('/api/events');

  sse.onopen = () => {
    sseConnected = true;
    setSSEStatus(true);
    console.log('[SSE] Terhubung');
  };

  sse.onerror = () => {
    sseConnected = false;
    setSSEStatus(false);
    console.warn('[SSE] Error / disconnect — reconnect otomatis...');
  };

  sse.addEventListener('status', (e) => {
    try {
      const d = JSON.parse(e.data);
      setMqttStatus(d.mqttConnected, d.msg);
    } catch {}
  });

  sse.addEventListener('mqtt', (e) => {
    try {
      const entry = JSON.parse(e.data);
      handleNewMessage(entry);
    } catch (err) {
      console.error('[SSE] Parse error:', err);
    }
  });
}

function setSSEStatus(ok) {
  const dot = document.getElementById('sse-dot');
  const txt = document.getElementById('sse-status');
  dot.className = 'dot ' + (ok ? 'green' : 'red');
  txt.innerHTML = `<span class="dot ${ok ? 'green' : 'red'}"></span>${ok ? 'Terhubung' : 'Terputus'}`;
}

function setMqttStatus(ok, msg) {
  const dot = document.getElementById('mqtt-dot');
  const txt = document.getElementById('mqtt-status');
  dot.className = 'dot ' + (ok ? 'green' : 'red');
  txt.innerHTML = `<span class="dot ${ok ? 'green' : 'red'}"></span>${msg || (ok ? 'Terhubung' : 'Terputus')}`;
}

// ── HANDLE NEW MESSAGE ────────────────────────────────────────────────────────
function handleNewMessage(entry) {
  totalCount++;
  document.getElementById('total-count').textContent = totalCount;

  // Format waktu lokal
  const d = new Date(entry.ts);
  const timeStr = d.toLocaleTimeString('id-ID', { hour12: false }) + '.' + String(d.getMilliseconds()).padStart(3, '0');
  document.getElementById('last-time').textContent = timeStr;
  document.getElementById('last-topic').textContent = entry.topic;

  // Update latest data display
  if (entry.parsed && typeof entry.parsed === 'object') {
    updateLatestData(entry.parsed);
  }

  // Add to log
  addLogEntry(entry);
}

function updateLatestData(parsed) {
  const box   = document.getElementById('latest-box');
  const grid  = document.getElementById('fields-grid');
  box.style.display = 'block';

  const HIGHLIGHT_KEYS = ['temperature', 'suhu', 'humidity', 'humi'];
  
  grid.innerHTML = '';
  for (const [k, v] of Object.entries(parsed)) {
    const item = document.createElement('div');
    item.className = 'field-item';
    const isHL = HIGHLIGHT_KEYS.includes(k);
    item.innerHTML = `
      <div class="field-key">${k}</div>
      <div class="field-val ${isHL ? 'highlight' : ''}">${JSON.stringify(v)}</div>
    `;
    grid.appendChild(item);
  }
}

function addLogEntry(entry) {
  const container = document.getElementById('log-container');
  
  // Hapus empty state jika ada
  const empty = container.querySelector('.empty-state');
  if (empty) empty.remove();

  const div = document.createElement('div');
  div.className = 'log-entry new-entry' + (entry.error ? ' error-entry' : '');

  const d = new Date(entry.ts);
  const timeStr = d.toLocaleTimeString('id-ID', { hour12: false });

  let rawDisplay = entry.raw;
  if (entry.parsed) {
    try {
      rawDisplay = JSON.stringify(entry.parsed, null, 2);
    } catch {}
  }

  div.innerHTML = `
    <div class="log-meta">
      <span class="log-no">#${entry.no || totalCount}</span>
      <span class="log-ts">${timeStr}</span>
      <span class="log-topic">${entry.topic}</span>
      ${entry.error ? `<span style="color:#ef4444;font-size:0.7rem">PARSE ERROR: ${entry.error}</span>` : ''}
    </div>
    <div class="log-raw">${rawDisplay.slice(0, 600)}</div>
  `;

  // Insert di paling atas
  container.insertBefore(div, container.firstChild);

  // Hapus dot animasi setelah 2 detik
  setTimeout(() => div.classList.remove('new-entry'), 2000);

  // Batasi 50 entri di DOM
  while (container.children.length > 50) {
    container.removeChild(container.lastChild);
  }
}

function clearLog() {
  const container = document.getElementById('log-container');
  container.innerHTML = `
    <div class="empty-state">
      <div class="big">⏳</div>
      Menunggu data dari ESP32...
    </div>
  `;
  totalCount = 0;
  document.getElementById('total-count').textContent = '0';
  document.getElementById('last-time').textContent = '–';
  document.getElementById('last-topic').textContent = '–';
  document.getElementById('latest-box').style.display = 'none';
}

// ── INIT ──────────────────────────────────────────────────────────────────────
// Muat log historis dari server
fetch('/api/log')
  .then(r => r.json())
  .then(entries => {
    if (!Array.isArray(entries) || entries.length === 0) return;
    // Tampilkan dari yang paling lama (reverse)
    [...entries].reverse().forEach(e => handleNewMessage(e));
    console.log(`[INIT] Loaded ${entries.length} log entries dari server`);
  })
  .catch(err => console.warn('[INIT] Tidak bisa load log historis:', err.message));

// Poll /api/debug setiap 5 detik untuk update MQTT status
setInterval(() => {
  fetch('/api/debug')
    .then(r => r.json())
    .then(d => setMqttStatus(d.mqttConnected, d.mqttConnected ? 'Terhubung' : 'Terputus'))
    .catch(() => {});
}, 5000);

connectSSE();
</script>
</body>
</html>
